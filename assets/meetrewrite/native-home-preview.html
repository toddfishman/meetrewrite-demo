<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rewrite Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7b6fe8;
      --background: #0a0e1b;
      --text: #ffffff;
      --mutedText: #e8e5f2;
      --accent: #e8e5f2;
      --surface: #0a0e1b;
      --subtle: #9797a7;
      --nav: #9aa3b8;
      --pink: #f04fbf;
      --cyan: #63dff6;
      --deepPurple: #3b274d;
      --ghost: #4f5264;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 390px;
      height: 844px;
      overflow: hidden;
      background: var(--background);
      font-family: 'Inter', sans-serif;
    }

    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      background: var(--background);
      color: var(--text);
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 26px 24px 0;
    }

    .brand {
      height: 28px;
      width: auto;
      display: block;
      margin-top: 4px;
    }

    .demo {
      color: #b5b4c3;
      font-size: 28px;
      font-weight: 400;
      line-height: 1;
      margin-top: 2px;
    }

    .hero {
      position: absolute;
      left: 0;
      right: 0;
      top: 210px;
      text-align: center;
      padding: 0 20px;
    }

    .hero h1, .hero h2 {
      margin: 0;
      color: var(--text);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .hero h1 {
      font-size: 78px;
    }

    .hero h2 {
      font-size: 76px;
      margin-top: 6px;
    }

    .arrow-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 22px 0 0;
      height: 118px;
    }

    .arrow-line {
      width: 6px;
      height: 78px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--pink) 0%, var(--primary) 55%, var(--cyan) 100%);
    }

    .arrow-head {
      font-size: 52px;
      line-height: 0.7;
      margin-top: -8px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      font-weight: 300;
    }

    .subcopy {
      margin-top: 48px;
      color: var(--subtle);
      font-size: 26px;
      font-weight: 400;
      line-height: 1.3;
    }

    .cta {
      width: 100%;
      max-width: 292px;
      height: 108px;
      margin: 78px auto 0;
      border: 0;
      border-radius: 54px;
      background: var(--primary);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .secondary {
      margin-top: 112px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--ghost);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .secondary-icon {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      background: var(--deepPurple);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background-image: linear-gradient(135deg, rgba(240,79,191,0.18), rgba(99,223,246,0.08));
      position: relative;
      overflow: hidden;
    }

    .secondary-icon::before {
      content: "👥";
      font-size: 16px;
      background: linear-gradient(135deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 118px;
      background: var(--background);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding: 14px 10px 22px;
    }

    .tab {
      width: 20%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--nav);
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.05;
    }

    .tab .icon {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      line-height: 1;
    }

    .tab.active {
      color: var(--pink);
    }

    .tab .boxed {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: var(--deepPurple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-top: 3px;
    }

    .home-icon { color: var(--pink); }
    .ship-icon, .plus-icon, .contact-icon { color: var(--nav); }
    .curtain-icon {
      background: linear-gradient(135deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img class="brand" data-rewrite-id="brand-logo" src="BrandLogo" alt="Brand" />
      <div class="demo">Demo</div>
    </div>

    <main class="hero">
      <h1>Web</h1>
      <div class="arrow-stack">
        <div class="arrow-line"></div>
        <div class="arrow-head">↓</div>
      </div>
      <h2>iOS.</h2>
      <div class="subcopy">Preview free. Pay when it ships.</div>
      <button class="cta">Start preview →</button>
      <div class="secondary">
        <span class="secondary-icon"></span>
        <span>GO BEHIND THE CURTAIN →</span>
      </div>
    </main>

    <nav class="tabbar" aria-label="Bottom Navigation">
      <div class="tab active">
        <div class="icon home-icon">⌂</div>
        <div>HOME</div>
      </div>
      <div class="tab">
        <div class="icon ship-icon">▣</div>
        <div>WHAT SHIPS</div>
      </div>
      <div class="tab">
        <div class="icon"><span class="boxed curtain-icon">👥</span></div>
        <div>BEHIND CURTAIN</div>
      </div>
      <div class="tab">
        <div class="icon plus-icon">＋</div>
        <div>GUIDED</div>
      </div>
      <div class="tab">
        <div class="icon contact-icon">◔</div>
        <div>CONTACT</div>
      </div>
    </nav>
  </div>
</body>
</html>
